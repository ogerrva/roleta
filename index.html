<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Premiada - CENTER TECH</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;700;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
}

body{
background: radial-gradient(circle at center, #1a0b2e 0%, #05010a 100%);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

/* LOGO */
.logo-container{
text-align:center;
margin-bottom:30px;
animation:float 3s ease-in-out infinite;
}

.logo{
font-family:'Montserrat',sans-serif;
font-size:4rem;
font-weight:900;
color:#fff;
text-transform:uppercase;
letter-spacing:3px;
text-shadow:
0 0 10px #00f3ff,
0 0 20px #00f3ff,
0 0 40px #00f3ff,
0 0 80px #0077ff;
}

.logo-subtitle{
font-size:1.2rem;
color:#00f3ff;
letter-spacing:5px;
text-transform:uppercase;
font-weight:700;
}

/* ROLETA */

.roulette-wrapper{
position:relative;
width:350px;
height:350px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:40px;
}

.roulette-border{
position:absolute;
width:380px;
height:380px;
border-radius:50%;
background:conic-gradient(#00f3ff,#ff00ea,#00f3ff,#ff00ea,#00f3ff);
animation:spin-border 2s linear infinite;
}

.roulette-border::after{
content:'';
position:absolute;
inset:10px;
background:#111;
border-radius:50%;
}

.wheel{
position:absolute;
width:340px;
height:340px;
border-radius:50%;
overflow:hidden;
transition: transform 5s cubic-bezier(0.15,0.9,0.2,1);

background: conic-gradient(
#ff0055 0deg 72deg,
#2a2a35 72deg 144deg,
#00b8ff 144deg 216deg,
#2a2a35 216deg 288deg,
#00ff88 288deg 360deg
);
}

.segment{
position:absolute;
top:0;
left:50%;
width:80px;
margin-left:-40px;
height:50%;
transform-origin:bottom center;
display:flex;
justify-content:flex-start;
align-items:center;
padding-top:25px;
writing-mode:vertical-rl;
font-weight:800;
font-size:14px;
color:#fff;
text-transform:uppercase;
text-shadow:2px 2px 4px rgba(0,0,0,0.9);
}

.seg-1{transform:rotate(36deg);}
.seg-2{transform:rotate(108deg);}
.seg-3{transform:rotate(180deg);}
.seg-4{transform:rotate(252deg);}
.seg-5{transform:rotate(324deg);color:#111;text-shadow:none;}

.pointer{
position:absolute;
top:-20px;
z-index:10;
border-left:20px solid transparent;
border-right:20px solid transparent;
border-top:40px solid #fff;
}

.center-dot{
position:absolute;
width:50px;
height:50px;
background:#fff;
border-radius:50%;
border:6px solid #111;
}

/* BOTAO */

.spin-btn{
background:linear-gradient(45deg,#ff00ea,#00f3ff);
border:none;
padding:15px 40px;
font-size:1.5rem;
font-weight:900;
color:white;
border-radius:50px;
cursor:pointer;
text-transform:uppercase;
box-shadow:0 10px 20px rgba(0,243,255,0.4);
animation:pulse-btn 2s infinite;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal-content{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
border:2px solid #00f3ff;
}

.modal h2{color:#fff;font-size:2rem;}
.modal p{color:#ccc;margin-bottom:20px;}

.prize-text{
color:#00ff88;
font-size:2rem;
font-weight:900;
}

.lose-text{
color:#ff0055;
font-size:2rem;
font-weight:900;
}

.close-btn{
background:#333;
border:none;
padding:10px 30px;
color:#fff;
border-radius:10px;
cursor:pointer;
}

/* RODAPÉ */

.footer{
position:fixed;
bottom:20px;
font-weight:800;
letter-spacing:2px;
color:#00f3ff;
text-shadow:0 0 10px #00f3ff;
}

/* ANIMAÇÕES */

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

@keyframes spin-border{
100%{transform:rotate(360deg)}
}

@keyframes pulse-btn{
0%{box-shadow:0 0 0 0 rgba(0,243,255,0.7)}
70%{box-shadow:0 0 0 20px rgba(0,243,255,0)}
100%{box-shadow:0 0 0 0 rgba(0,243,255,0)}
}

</style>
</head>

<body>

<div class="logo-container">
<h1 class="logo">CENTER TECH</h1>
<div class="logo-subtitle">SORTEIO EXCLUSIVO</div>
</div>

<div class="roulette-wrapper">

<div class="pointer"></div>
<div class="roulette-border"></div>

<div class="wheel" id="wheel">

<div class="segment seg-1">Capinha</div>
<div class="segment seg-2">Não foi dessa vez</div>
<div class="segment seg-3">Película</div>
<div class="segment seg-4">Não foi dessa vez</div>
<div class="segment seg-5">Fone</div>

</div>

<div class="center-dot"></div>
</div>

<button class="spin-btn" id="spinBtn">Girar Roleta</button>

<div class="modal" id="resultModal">
<div class="modal-content">

<h2 id="modalTitle">Parabéns</h2>
<p id="modalDesc">Você ganhou:</p>

<div id="modalPrize" class="prize-text">PRÊMIO</div>

<br>

<button class="close-btn" onclick="closeModal()">Continuar</button>

</div>
</div>

<div class="footer">
PROMOÇÃO EXCLUSIVA PARA A EXPO B.E.I
</div>

<script>

const wheel=document.getElementById('wheel');
const spinBtn=document.getElementById('spinBtn');

const modal=document.getElementById('resultModal');
const modalTitle=document.getElementById('modalTitle');
const modalDesc=document.getElementById('modalDesc');
const modalPrize=document.getElementById('modalPrize');

const options=[
{name:"Capinha",type:"win"},
{name:"Não foi dessa vez",type:"lose"},
{name:"Película",type:"win"},
{name:"Não foi dessa vez",type:"lose"},
{name:"Fone",type:"win"}
];

let currentRotation=0;
let spinning=false;

spinBtn.onclick=()=>{

if(spinning)return;

spinning=true;

const index=Math.floor(Math.random()*options.length);

const slice=360/options.length;

const target=(index*slice)+(slice/2);

const stop=360-target;

const spins=5;

const total=currentRotation+(spins*360)+stop-(currentRotation%360);

currentRotation=total;

wheel.style.transform=`rotate(${currentRotation}deg)`;

setTimeout(()=>{

showResult(options[index]);

spinning=false;

},5000)

};

function showResult(result){

if(result.type==="win"){

modalTitle.innerText="🎉 PARABÉNS 🎉";

modalDesc.innerText="Receba seu prêmio com a galera da CENTER TECH";

modalPrize.className="prize-text";

modalPrize.innerText=result.name;

}else{

modalTitle.innerText="Quase!";

modalDesc.innerText="Tente novamente!";

modalPrize.className="lose-text";

modalPrize.innerText=result.name;

}

modal.classList.add('active');

}

function closeModal(){

modal.classList.remove('active');

}

</script>

</body>
</html>
