
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta Premiada - CenterTeck</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #05010a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* LOGO CENTERTECK */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                0 0 10px #00f3ff,
                0 0 20px #00f3ff,
                0 0 40px #00f3ff,
                0 0 80px #0077ff;
            margin: 0;
            line-height: 1;
        }

        .logo-subtitle {
            font-size: 1.2rem;
            color: #00f3ff;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 5px #00f3ff;
        }

        /* CONTAINER DA ROLETA */
        .roulette-wrapper {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        /* LUZES EM VOLTA DA ROLETA */
        .roulette-border {
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #00f3ff, #ff00ea, #00f3ff, #ff00ea, #00f3ff);
            animation: spin-border 2s linear infinite;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            z-index: 1;
        }

        .roulette-border::after {
            content: '';
            position: absolute;
            inset: 10px;
            background: #111;
            border-radius: 50%;
        }

        /* A ROLETA EM SI */
        .wheel {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 2;
            transition: transform 5s cubic-bezier(0.15, 0.9, 0.2, 1);
            /* 5 fatias de 72 graus cada */
            background: conic-gradient(
                #ff0055 0deg 72deg,    /* 1. Capinha */
                #2a2a35 72deg 144deg,  /* 2. Não foi dessa vez */
                #00b8ff 144deg 216deg, /* 3. Película */
                #2a2a35 216deg 288deg, /* 4. Não foi dessa vez */
                #00ff88 288deg 360deg  /* 5. Fone */
            );
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* TEXTOS DENTRO DA ROLETA - ALINHAMENTO CORRIGIDO */
        .segment {
            position: absolute;
            top: 0;
            left: 50%; /* Começa exatamente no centro horizontal */
            width: 80px; /* Largura da "faixa" de texto */
            margin-left: -40px; /* Puxa para a esquerda para centralizar a faixa no eixo */
            height: 50%; /* Altura do centro até a borda */
            transform-origin: bottom center; /* Ponto de rotação no EXATO centro da roleta */
            display: flex;
            justify-content: flex-start; /* Joga o texto para a borda da roleta */
            align-items: center; /* Centraliza na faixa */
            padding-top: 25px; /* Distância da borda externa */
            box-sizing: border-box;
            
            /* Estilo da Fonte */
            writing-mode: vertical-rl; /* Texto de cima pra baixo */
            font-weight: 800;
            font-size: 14px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        /* Posição Exata dos 5 textos no centro de cada ângulo (72 graus cada) */
        /* 0 a 72 -> centro 36 */
        .seg-1 { transform: rotate(36deg); }
        /* 72 a 144 -> centro 108 */
        .seg-2 { transform: rotate(108deg); }
        /* 144 a 216 -> centro 180 */
        .seg-3 { transform: rotate(180deg); }
        /* 216 a 288 -> centro 252 */
        .seg-4 { transform: rotate(252deg); color: #ff6b6b; } /* Destaque leve no perder */
        /* 288 a 360 -> centro 324 */
        .seg-5 { transform: rotate(324deg); color: #111; text-shadow: none; } /* Verde claro pede texto escuro */

        /* MARCADOR (PONTEIRO) */
        .pointer {
            position: absolute;
            top: -20px;
            z-index: 10;
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #fff;
            filter: drop-shadow(0 0 10px #fff);
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -45px; left: -15px;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff00ea;
        }

        /* BOTAO CENTRAL */
        .center-dot {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            border: 6px solid #111;
        }

        /* BOTAO DE GIRAR */
        .spin-btn {
            background: linear-gradient(45deg, #ff00ea, #00f3ff);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.4);
            transition: all 0.3s ease;
            animation: pulse-btn 2s infinite;
            position: relative;
            z-index: 20;
        }

        .spin-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(255, 0, 234, 0.6);
        }

        .spin-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            animation: none;
            transform: scale(1);
        }

        /* MODAL DE RESULTADO */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.3);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal h2 { font-size: 2.5rem; color: #fff; margin-bottom: 10px; }
        .modal p { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; }
        
        .modal .prize-text {
            color: #00ff88; font-weight: 900; font-size: 2.5rem;
            text-shadow: 0 0 10px #00ff88; text-transform: uppercase;
        }
        .modal .lose-text {
            color: #ff0055; font-weight: 900; font-size: 2rem;
            text-shadow: 0 0 10px #ff0055; text-transform: uppercase;
        }

        .close-btn {
            background: #333; color: white; border: none;
            padding: 10px 30px; font-size: 1.2rem;
            border-radius: 10px; cursor: pointer;
            font-family: 'Poppins', sans-serif; font-weight: bold;
        }
        .close-btn:hover { background: #555; }

        /* CONFETES CONTAINER */
        #confetti-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 99; overflow: hidden;
        }
        .confetti {
            position: absolute; width: 10px; height: 20px;
            background: #f00; animation: fall linear forwards;
        }

        /* ANIMACOES */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes spin-border { 100% { transform: rotate(360deg); } }
        @keyframes pulse-btn {
            0% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 243, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); }
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* RESPONSIVO */
        @media (max-width: 500px) {
            .logo { font-size: 2.8rem; }
            .roulette-wrapper { width: 300px; height: 300px; }
            .roulette-border { width: 330px; height: 330px; }
            .wheel { width: 290px; height: 290px; }
            .segment { font-size: 12px; padding-top: 15px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1 class="logo">CenterTeck</h1>
        <div class="logo-subtitle">Sorteio Exclusivo</div>
    </div>

    <!-- ROLETA -->
    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-border"></div>
        <div class="wheel" id="wheel">
            <!-- Textos Posicionados Precisamente -->
            <div class="segment seg-1">Capinha</div>
            <div class="segment seg-2">Não foi dessa vez</div>
            <div class="segment seg-3">Película</div>
            <div class="segment seg-4">Não foi dessa vez</div>
            <div class="segment seg-5">Fone</div>
        </div>
        <div class="center-dot"></div>
    </div>

    <!-- BOTAO -->
    <button class="spin-btn" id="spinBtn">Girar Roleta!</button>

    <!-- MODAL -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2 id="modalTitle">Parabéns!</h2>
            <p id="modalDesc">Você ganhou um prêmio incrível:</p>
            <div id="modalPrize" class="prize-text">FONE DE OUVIDO</div>
            <br>
            <button class="close-btn" onclick="closeModal()">Continuar</button>
        </div>
    </div>

    <!-- CONFETES -->
    <div id="confetti-container"></div>

    <script>
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const modal = document.getElementById('resultModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const modalPrize = document.getElementById('modalPrize');
        const confettiContainer = document.getElementById('confetti-container');

        // Lógica dos Itens (Ordem Visual Horária do HTML)
        const options = [
            { name: "Capinha", type: "win" },
            { name: "Não foi dessa vez", type: "lose" },
            { name: "Película", type: "win" },
            { name: "Não foi dessa vez", type: "lose" },
            { name: "Fone", type: "win" }
        ];

        let currentRotation = 0;
        let isSpinning = false;

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.innerText = "GIRANDO...";

            const prizeIndex = Math.floor(Math.random() * options.length);
            
            // Fatias de 72 graus. O centro do vencedor.
            const sliceAngle = 360 / options.length; 
            const targetAngle = (prizeIndex * sliceAngle) + (sliceAngle / 2);
            const stopAngle = 360 - targetAngle;

            // 5 giros + angulo de parada
            const extraSpins = 5; 
            const totalRotation = currentRotation + (extraSpins * 360) + stopAngle - (currentRotation % 360);

            currentRotation = totalRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                showResult(options[prizeIndex]);
                isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.innerText = "GIRAR NOVAMENTE!";
            }, 5000);
        });

        function showResult(result) {
            if (result.type === "win") {
                modalTitle.innerText = "🎉 PARABÉNS! 🎉";
                modalTitle.style.color = "#fff";
                modalDesc.innerText = "Sorte grande! Dirija-se ao caixa e retire seu prêmio:";
                modalPrize.className = "prize-text";
                modalPrize.innerText = result.name;
                fireConfetti();
            } else {
                modalTitle.innerText = "Aaaah... 😢";
                modalTitle.style.color = "#ccc";
                modalDesc.innerText = "A sorte passou raspando.";
                modalPrize.className = "lose-text";
                modalPrize.innerText = result.name;
            }
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            confettiContainer.innerHTML = ''; 
        }

        function fireConfetti() {
            const colors = ['#00f3ff', '#ff00ea', '#00ff88', '#fff', '#ff0055'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const size = Math.random() * 10 + 5;
                confetti.style.width = size + 'px';
                confetti.style.height = (size * 2) + 'px';
                
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 0.5) + 's';
                
                confettiContainer.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
