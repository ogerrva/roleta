<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Premiada - CENTER TECH</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;700;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
overflow:hidden;

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

background: radial-gradient(circle at center,#1a0b2e 0%,#05010a 100%);

font-family:'Poppins',sans-serif;

padding:20px;
}

/* LOGO */

.logo-container{

text-align:center;

}

.logo{

font-family:'Montserrat';
font-size:clamp(2rem,4vw,3.5rem);
font-weight:900;
color:white;

letter-spacing:3px;

text-shadow:
0 0 10px #00f3ff,
0 0 20px #00f3ff,
0 0 40px #00f3ff;

}

.logo-subtitle{

color:#00f3ff;
font-weight:700;
letter-spacing:4px;

}

/* AREA CENTRAL */

.center-area{

flex:1;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:25px;

}

/* ROLETA */

.roulette-wrapper{

position:relative;

width:min(70vw,400px);
aspect-ratio:1;

display:flex;
align-items:center;
justify-content:center;

}

.roulette-border{

position:absolute;

width:110%;
height:110%;

border-radius:50%;

background:conic-gradient(#00f3ff,#ff00ea,#00f3ff,#ff00ea,#00f3ff);

animation:spin-border 2s linear infinite;

}

.roulette-border::after{

content:'';

position:absolute;
inset:10px;

background:#111;

border-radius:50%;

}

.wheel{

position:absolute;

width:100%;
height:100%;

border-radius:50%;

overflow:hidden;

transition: transform 5s cubic-bezier(0.15,0.9,0.2,1);

background: conic-gradient(

#ff0055 0deg 72deg,
#2a2a35 72deg 144deg,
#00b8ff 144deg 216deg,
#2a2a35 216deg 288deg,
#00ff88 288deg 360deg

);

}

/* TEXTOS */

.segment{

position:absolute;

top:0;
left:50%;

width:70px;

margin-left:-35px;

height:50%;

transform-origin:bottom center;

display:flex;
align-items:center;
justify-content:flex-start;

padding-top:20px;

writing-mode:vertical-rl;

font-weight:800;
font-size:clamp(10px,1.2vw,14px);

color:white;

text-shadow:2px 2px 4px black;

}

.seg-1{transform:rotate(36deg);}
.seg-2{transform:rotate(108deg);}
.seg-3{transform:rotate(180deg);}
.seg-4{transform:rotate(252deg);}
.seg-5{transform:rotate(324deg);color:#111;text-shadow:none;}

/* PONTEIRO */

.pointer{

position:absolute;

top:-18px;
left:50%;

transform:translateX(-50%);

border-left:16px solid transparent;
border-right:16px solid transparent;
border-top:32px solid white;

z-index:10;

}

/* CENTRO */

.center-dot{

position:absolute;

width:12%;
aspect-ratio:1;

background:white;

border-radius:50%;

border:6px solid #111;

}

/* BOTÃO */

.spin-btn{

background:linear-gradient(45deg,#ff00ea,#00f3ff);

border:none;

padding:14px 35px;

font-size:clamp(1rem,1.5vw,1.4rem);

font-weight:900;

color:white;

border-radius:50px;

cursor:pointer;

}

/* RODAPÉ */

.footer{

text-align:center;

font-weight:900;

letter-spacing:2px;

color:#00f3ff;

text-shadow:0 0 10px #00f3ff;

font-size:clamp(0.8rem,1vw,1rem);

}

/* MODAL */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;

transition:0.3s;

}

.modal.active{

opacity:1;
pointer-events:auto;

}

.modal-content{

background:#111;

padding:40px;

border-radius:20px;

border:2px solid #00f3ff;

text-align:center;

}

.prize-text{

color:#00ff88;

font-size:2rem;

font-weight:900;

}

.lose-text{

color:#ff0055;

font-size:2rem;

font-weight:900;

}

.close-btn{

margin-top:20px;

background:#333;

border:none;

padding:10px 25px;

color:white;

border-radius:10px;

cursor:pointer;

}

/* ANIMAÇÕES */

@keyframes spin-border{

100%{transform:rotate(360deg)}

}

</style>

</head>

<body>

<div class="logo-container">

<div class="logo">CENTER TECH</div>
<div class="logo-subtitle">SORTEIO EXCLUSIVO</div>

</div>

<div class="center-area">

<div class="roulette-wrapper">

<div class="pointer"></div>

<div class="roulette-border"></div>

<div class="wheel" id="wheel">

<div class="segment seg-1">Capinha</div>
<div class="segment seg-2">Não foi dessa vez</div>
<div class="segment seg-3">Película</div>
<div class="segment seg-4">Não foi dessa vez</div>
<div class="segment seg-5">Fone</div>

</div>

<div class="center-dot"></div>

</div>

<button class="spin-btn" id="spinBtn">GIRAR ROLETA</button>

</div>

<div class="footer">

PROMOÇÃO EXCLUSIVA PARA A EXPO B.E.I

</div>

<div class="modal" id="resultModal">

<div class="modal-content">

<h2 id="modalTitle"></h2>

<p id="modalDesc"></p>

<div id="modalPrize"></div>

<button class="close-btn" onclick="closeModal()">Continuar</button>

</div>

</div>

<script>

const wheel=document.getElementById("wheel")
const spinBtn=document.getElementById("spinBtn")

const modal=document.getElementById("resultModal")
const modalTitle=document.getElementById("modalTitle")
const modalDesc=document.getElementById("modalDesc")
const modalPrize=document.getElementById("modalPrize")

const options=[

{name:"Capinha",type:"win"},
{name:"Não foi dessa vez",type:"lose"},
{name:"Película",type:"win"},
{name:"Não foi dessa vez",type:"lose"},
{name:"Fone",type:"win"}

]

let currentRotation=0
let spinning=false

spinBtn.addEventListener("click",spin)

function spin(){

if(spinning)return

spinning=true

const index=Math.floor(Math.random()*options.length)

const slice=360/options.length

const target=(index*slice)+(slice/2)

const stop=360-target

const spins=5

const total=currentRotation+(spins*360)+stop-(currentRotation%360)

currentRotation=total

wheel.style.transform=`rotate(${currentRotation}deg)`

setTimeout(()=>{

showResult(options[index])

spinning=false

},5000)

}

function showResult(result){

if(result.type==="win"){

modalTitle.innerText="🎉 PARABÉNS 🎉"
modalDesc.innerText="Receba seu prêmio com a galera da CENTER TECH"

modalPrize.className="prize-text"
modalPrize.innerText=result.name

}else{

modalTitle.innerText="Quase!"
modalDesc.innerText="Tente novamente!"

modalPrize.className="lose-text"
modalPrize.innerText=result.name

}

modal.classList.add("active")

}

function closeModal(){

modal.classList.remove("active")

}

</script>

</body>
</html>
